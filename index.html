<!DOCTYPE html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Space Invasion (Sector 67)</title>
	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2346d7ff'/%3E%3Cstop offset='1' stop-color='%23ff4f94'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23081122'/%3E%3Cpath d='M32 11l8 12 13 2-9 9 2 13-12-7-12 7 2-13-9-9 13-2z' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='30' r='4' fill='%23eaf6ff'/%3E%3C/svg%3E">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bungee:wght@400&family=Chakra+Petch:wght@400;600;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="bg-orb orb-a"></div>
	<div class="bg-orb orb-b"></div>
	<div class="bg-orb orb-c"></div>
	<main class="game-shell">
		<header class="top-bar">
			<div>
				<p class="eyebrow">Sector 67 Under Attack</p>
				<h1 class="title">SPACE INVASION MAZE</h1>
			</div>
			<div class="button-row">
				<button id="play-btn" class="start-button">Igraj</button>
				<button id="start-btn" class="start-button secondary">Pokazi cilj</button>
			</div>
		</header>
		<div class="meta-row">
			<div id="timer-div" class="timer-chip">Time: 0:00</div>
			<div id="mission-chip" class="meta-chip mission-chip">Status: Ready</div>
			<div class="meta-chip objective-chip">Misija: Pridi do cilja</div>
			<div class="visit-card">
				<p class="visit-title">Credits:</p>
				<p class="visit-line">Žiga Černe Bralić</p>
				<p class="visit-line">4.RA</p>
				<p class="visit-line">3. Projektna naloga</p>
			</div>
		</div>
		<div class="svg-canvas-container">
			<svg class="maze-svg" width="484" height="484" viewBox="0 0 484 484" version="1.1"
				xmlns="http://www.w3.org/2000/svg">
				<image href="slike/maze.svg" width="484" height="484" />
			</svg>
			<canvas id="maze-canvas" width="484" height="484" class="maze-canvas"></canvas>
		</div>
	</main>
	<!-- SweetAlert2 CDN -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/LineDraw.js"></script>
<script src="js/Play.js"></script>
</body>

</html>
